name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "bs_frontend/**"
      - ".github/workflows/deploy-pages.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bs_frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bs_frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build Angular application
        run: npm run build -- --configuration production --base-href /bs_web/

      - name: Find build output
        run: |
          OUTPUT_DIR=$(find dist -type f -name index.html -exec dirname {} \; | head -n 1)

          if [ -z "$OUTPUT_DIR" ]; then
            echo "Angular build output could not be found."
            exit 1
          fi

          echo "Build output: $OUTPUT_DIR"

          cp "$OUTPUT_DIR/index.html" "$OUTPUT_DIR/404.html"
          touch "$OUTPUT_DIR/.nojekyll"

          echo "OUTPUT_DIR=$OUTPUT_DIR" >> "$GITHUB_ENV"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: bs_frontend/${{ env.OUTPUT_DIR }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4